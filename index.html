<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
    <title>El viaje fotográfico de Mauro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="page-index chrome-is-entering">
    <div class="page">
      <header class="site-header">
        <nav class="site-header__nav" aria-label="Principal">
          <a href="personal.html">Series</a>
          <a href="sobre-mi.html">Sobre mi</a>
        </nav>
        <a class="site-header__title" href="index.html">[ El viaje fotográfico de Mauro ]</a>
        <div class="site-header__social">
          <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img class="site-header__icon" src="assets/icons/icon-instagram.svg" width="16" height="16" alt="" />
          </a>
          <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <img class="site-header__icon" src="assets/icons/icon-youtube.svg" width="16" height="16" alt="" />
          </a>
        </div>
        <button
          type="button"
          class="site-header__menu-btn"
          data-menu-open
          aria-expanded="false"
          aria-controls="menu-overlay"
          aria-label="Abrir menú"
        >
          <svg width="27" height="21" viewBox="0 0 27 21" fill="none" aria-hidden="true">
            <path stroke="currentColor" stroke-width="2" d="M0 1.5h27M0 10.5h27M0 19.5h20" />
          </svg>
        </button>
      </header>

      <main class="gallery-page gallery-page--single" data-series-gallery data-index-hero>
        <div class="gallery-desktop">
          <section class="gallery-page__layout gallery-page--desktop-only" aria-label="Inicio">
            <div class="gallery-page__center">
              <div class="gallery-page__stage">
                <div class="gallery-page__frame" data-gallery-frame>
                  <button type="button" class="gallery-page__nav gallery-page__nav--prev" data-gallery-prev aria-label="Foto anterior">
                    <img src="assets/icons/arrow-scroll-left.svg" width="28" height="28" alt="" />
                  </button>
                  <div class="gallery-page__viewport cursor-slideshow-target">
                    <div class="gallery-page__hero">
                      <div class="img-reveal" data-img-reveal>
                        <img
                          data-gallery-main
                          src="assets/photos/index-01.png"
                          width="1024"
                          height="682"
                          alt="Fotografía de Mauro Gianzone"
                          data-orientation="landscape"
                          loading="eager"
                        />
                      </div>
                    </div>
                  </div>
                  <button type="button" class="gallery-page__nav gallery-page__nav--next" data-gallery-next aria-label="Foto siguiente">
                    <img src="assets/icons/arrow-scroll-right.svg" width="28" height="28" alt="" />
                  </button>
                </div>
              </div>
              <p class="gallery-page__counter gallery-page__counter--desktop" data-gallery-counter aria-live="polite">1/5</p>
            </div>
          </section>
        </div>

        <section class="gallery-mobile" aria-label="Inicio móvil">
          <div class="gallery-mobile__stage">
            <div class="gallery-page__frame" data-gallery-frame>
              <button type="button" class="gallery-page__nav gallery-page__nav--prev" data-gallery-prev aria-label="Foto anterior">
                <img src="assets/icons/arrow-scroll-left.svg" width="28" height="28" alt="" />
              </button>
              <div class="gallery-page__viewport cursor-slideshow-target">
                <div class="gallery-page__hero">
                  <div class="img-reveal" data-img-reveal>
                    <img
                      data-gallery-main
                      src="assets/photos/index-01.png"
                      width="1024"
                      height="682"
                      alt="Fotografía de Mauro Gianzone"
                      data-orientation="landscape"
                      loading="eager"
                    />
                  </div>
                </div>
              </div>
              <button type="button" class="gallery-page__nav gallery-page__nav--next" data-gallery-next aria-label="Foto siguiente">
                <img src="assets/icons/arrow-scroll-right.svg" width="28" height="28" alt="" />
              </button>
            </div>
            <p class="gallery-page__tap-hint">(Toca para ver más)</p>
            <p class="gallery-page__counter gallery-page__counter--mobile" data-gallery-counter aria-live="polite">1/5</p>
          </div>
        </section>
        <ul class="gallery-page__photos" data-gallery-photos hidden aria-hidden="true">
          <li
            data-gallery-photo
            data-src="assets/photos/index-01.png"
            data-w="1024"
            data-h="682"
            data-alt="Fotografía de Mauro Gianzone — 01"
            data-orientation="landscape"
          ></li>
          <li
            data-gallery-photo
            data-src="assets/photos/index-02.png"
            data-w="1024"
            data-h="682"
            data-alt="Fotografía de Mauro Gianzone — 02"
            data-orientation="landscape"
          ></li>
          <li
            data-gallery-photo
            data-src="assets/photos/index-03.png"
            data-w="1024"
            data-h="682"
            data-alt="Fotografía de Mauro Gianzone — 03"
            data-orientation="landscape"
          ></li>
          <li
            data-gallery-photo
            data-src="assets/photos/index-04.png"
            data-w="1024"
            data-h="682"
            data-alt="Fotografía de Mauro Gianzone — 04"
            data-orientation="landscape"
          ></li>
          <li
            data-gallery-photo
            data-src="assets/photos/index-05.png"
            data-w="1024"
            data-h="768"
            data-alt="Fotografía de Mauro Gianzone — 05"
            data-orientation="landscape"
          ></li>
        </ul>
      </main>

      <footer class="site-footer">
        <button type="button" class="theme-toggle" aria-label="Cambiar tema">
          <img class="theme-toggle__icon" src="assets/icons/icon-dark-mode.svg" width="30" height="30" alt="" />
        </button>
        <p class="site-footer__copy">© 2026 Mauro Gianzone</p>
      </footer>
    </div>

    <div class="menu-overlay" id="menu-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Menú">
      <button type="button" class="menu-overlay__close" data-menu-close aria-label="Cerrar menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" />
        </svg>
      </button>
      <a href="personal.html">Series</a>
      <a href="sobre-mi.html">Sobre mi</a>
      <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">Canal de YouTube</a>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>

    <script src="js/main.js"></script>
    <script src="js/swipe-letters.js"></script>
    <script src="js/chrome-enter.js"></script>
    <script src="js/page-exit.js"></script>
    <script src="js/img-reveal.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/index-cursor.js"></script>
  </body>
</html>
